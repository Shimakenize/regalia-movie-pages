    /* 検索・フィルタ（白エリア） */
    .toolbar-wrap { padding: 16px 20px; background: #111827; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 0; }
    .search-wrap {
      width: 100%;
      display: flex;
      align-items: center;
      background: #0b1220;
      border: 1px solid #233041;
      border-radius: 8px;
      padding: 0 14px;
      min-height: 44px;
      margin-bottom: 12px;
    }
    .search-wrap .search-icon { color: #8fb9d6; margin-right: 8px; flex-shrink: 0; }
    .search-wrap input { flex: 1; min-width: 0; border: none; background: transparent; padding: 10px 0; font-size: 1rem; outline: none; color: #e5e7eb; caret-color: #2ed3c6; }
    .search-wrap input::placeholder { color: #8aa3bc; opacity: 1; }
    .toolbar input[type="text"].search-input { min-height: auto; border: none; }
    .toolbar select { padding: 8px 12px; border: 1px solid #2b4258; color: #e5e7eb; border-radius: 8px; min-height: 40px; font-size: 0.95rem; background: #0b1220; }
    .toolbar label { font-size: 0.9rem; color: #9ccce6; }
    .btn { padding: 8px 16px; min-height: 40px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: #2ed3c6; color: #06212b; font-weight: 700; }
    .btn-primary:hover { background: #27bdb1; }
    .btn-reset { background: #64748b; color: #f8fafc; }
    .btn-reset:hover { background: #475569; }
    .count { font-size: 0.9rem; color: #9ccce6; }
    .toolbar-row-3 { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; justify-content: space-between; width: 100%; }

  <script>

    var allData = [];

    var DISPLAY_ORDER = ['サムネイル','タイトル','URL','試合名','学年','対戦相手','投稿者','投稿年月','日付','概要'];
    var KEY_MAP = { Title:'タイトル', URL:'URL', Thumbnail:'サムネイル', FinalDate:'日付', Grade:'学年', MatchName:'試合名', Opponent:'対戦相手', Description:'概要' };
    function toYearMonth(s) {
      if (s == null || s === '') return '';
      var str = String(s).trim();
      var m = str.match(/^(\d{4})\/(\d{1,2})(?:\/\d{1,2})?$/);
      if (m) return m[1] + '/' + ('0' + parseInt(m[2], 10)).slice(-2);
      var d = new Date(str);
      if (!isNaN(d.getTime())) return d.getFullYear() + '/' + ('0' + (d.getMonth() + 1)).slice(-2);
      return str;
    }
    function normalizeRow(row) {
      var out = {};
      for (var k in row) {
        if (KEY_MAP[k]) out[KEY_MAP[k]] = row[k];
        else if (DISPLAY_ORDER.indexOf(k) !== -1) out[k] = row[k];
      }
      out['投稿年月'] = toYearMonth(out['投稿年月'] || out['日付']);
      return out;
    }

    function formatDateShort(s) {
      if (s == null || s === '') return '';
      if (typeof s === 'object' && s.getFullYear) return s.getFullYear() + '/' + (s.getMonth() + 1) + '/' + s.getDate();
      var d = new Date(s);
      if (!isNaN(d.getTime())) return d.getFullYear() + '/' + (d.getMonth() + 1) + '/' + d.getDate();
      s = String(s).trim();
      var m = s.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})/);
      if (m) return m[1] + '/' + parseInt(m[2], 10) + '/' + parseInt(m[3], 10);
      return s;
    }
    /** ソート用ミリ秒。日付なしは一覧の末尾（最古扱い） */
    function sortKeyDateMs(row) {
      var s = String(row['日付'] || '').trim();
      var m = s.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})/);
      if (m) {
        var y = parseInt(m[1], 10), mo = parseInt(m[2], 10) - 1, d = parseInt(m[3], 10);
        var t = new Date(y, mo, d).getTime();
        if (!isNaN(t)) return t;
      }
      var d2 = new Date(s);
      if (!isNaN(d2.getTime())) return d2.getTime();
      return Number.NEGATIVE_INFINITY;
    }
    /** Veo / YouTube 共通で「日付」が新しい順（同日内は URL で安定） */
    function sortRowsNewestFirst(rows) {
      return rows.slice().sort(function(a, b) {
        var ka = sortKeyDateMs(a), kb = sortKeyDateMs(b);
        if (kb !== ka) return kb - ka;
        var ua = String(a['URL'] || ''), ub = String(b['URL'] || '');
        return ua < ub ? -1 : (ua > ub ? 1 : 0);
      });
    }
    function resetFilters() {
      document.getElementById('search').value = '';
      document.getElementById('filterGrade').value = '';
      document.getElementById('filterMatchName').value = '';
      document.getElementById('filterOpponent').value = '';
      document.getElementById('filterUploader').value = '';
      document.getElementById('filterUploadMonth').value = '';
      fillFilters();
      applyFilters();

    function uniqueFrom(data, key) {
      var set = {};
      data.forEach(function(row) {
        var v = row[key] || '';
        if (v) set[v] = true;
      });
      return Object.keys(set).sort();
    }
    /** 検索窓の文字列をスペース区切りでキーワードに分割し、行がすべてのキーワードを含むか（AND） */
    function rowMatchesSearchKeywords(row, searchValue) {
      var keywords = (searchValue || '').toLowerCase().split(/\s+/).filter(function(s) { return s.length > 0; });
      if (keywords.length === 0) return true;
      for (var i = 0; i < keywords.length; i++) {
        var kw = keywords[i];
        var found = false;
        for (var k in row) {
          if (String(row[k]).toLowerCase().indexOf(kw) !== -1) { found = true; break; }
        }
        if (!found) return false;
      }
      return true;
    }
    function dataFilteredBySearch() {
      var q = (document.getElementById('search').value || '').trim();
      if (!q) return allData;
      return allData.filter(function(row) { return rowMatchesSearchKeywords(row, q); });
    }
    function dataFilteredBySearchAndGrade() {
      var q = (document.getElementById('search').value || '').trim();
      var grade = (document.getElementById('filterGrade').value || '').toLowerCase();
      return allData.filter(function(row) {
        if (q && !rowMatchesSearchKeywords(row, q)) return false;
        if (grade && (row['学年'] || '').toLowerCase() !== grade) return false;
        return true;
      });
    }
    function dataFilteredBySearchAndGradeAndMatchName() {
      var q = (document.getElementById('search').value || '').trim();
      var grade = (document.getElementById('filterGrade').value || '').toLowerCase();

      return allData.filter(function(row) {
        if (q && !rowMatchesSearchKeywords(row, q)) return false;
        if (grade && (row['学年'] || '').toLowerCase() !== grade) return false;
        if (match && (row['試合名'] || '').toLowerCase() !== match) return false;
        return true;
      });
    }

    function escapeHtml(s) {
      if (s == null) return '';
      var div = document.createElement('div');
      div.textContent = s;

      if (url) h += '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener" class="card-thumb-link" aria-label="動画を開く" data-video-url="' + urlAttr + '" data-video-title="' + titleAttr + '"></a>';
      h += '</div><div class="card-body">';
      if (url) h += '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener" class="card-title" data-video-url="' + urlAttr + '" data-video-title="' + titleAttr + '">' + titleEsc + '</a>';
      else h += '<span class="card-title">' + titleEsc + '</span>';
      h += '<div class="card-meta">';
      if (opponent) h += '<span class="card-opponent">' + escapeHtml(opponent) + '</span>';
      h += '<span class="card-date">📅 ' + escapeHtml(dateStr) + '</span></div></div></div>';
      return h;
    }
    function renderPage() {
      var total = filteredData.length;
      var start = (currentPage - 1) * PAGE_SIZE;
      var end = Math.min(start + PAGE_SIZE, total);
      var gridHtml = '<div class="video-grid">';
      for (var i = start; i < end; i++) {
        gridHtml += buildCardHtml(filteredData[i]);
      }
      gridHtml += '</div>';
      var navHtml = '';
      if (total > PAGE_SIZE) {
        var totalPages = Math.ceil(total / PAGE_SIZE);
        navHtml = '<nav class="page-nav">';
        navHtml += '<button type="button" class="btn btn-secondary btn-nav" id="btnPrev" ' + (currentPage <= 1 ? 'disabled' : '') + '>前へ</button>';
        navHtml += '<span class="page-info">' + (start + 1) + '-' + end + ' 件を表示（全 ' + total + ' 件）</span>';
        navHtml += '<button type="button" class="btn btn-secondary btn-nav" id="btnNext" ' + (currentPage >= totalPages ? 'disabled' : '') + '>次へ</button>';
        navHtml += '</nav>';
      }
      document.getElementById('content').innerHTML = gridHtml + navHtml;
      if (total > PAGE_SIZE) {
        document.getElementById('btnPrev').addEventListener('click', function() {
          if (currentPage > 1) { currentPage--; renderPage(); }
        });
        document.getElementById('btnNext').addEventListener('click', function() {
          if (currentPage < Math.ceil(total / PAGE_SIZE)) { currentPage++; renderPage(); }
        });
      }
    }
    function renderTable() {
      document.getElementById('count').textContent = filteredData.length + '件の動画';
      if (filteredData.length === 0) {
        var hint = '';
        if (allData.length === 0) {
          hint = 'データが取得できませんでした。スプレッドシートのタブ名が「formatted_soccer_videos」になっているか確認してください。';
        } else {
          hint = '該当なし';
        }
        document.getElementById('content').innerHTML = '<div class="error">' + escapeHtml(hint) + '</div>';
        return;
      }
      currentPage = 1;
      renderPage();
    }

    function loadScript(src) {
      return new Promise(function(resolve, reject) {
        var s = document.createElement('script');
        s.src = src;
        s.onload = function() { resolve(); };
        s.onerror = function() { reject(new Error('script load')); };
        document.head.appendChild(s);
      });
    }

    function showLoadError(msg) {
      document.getElementById('content').innerHTML = '<div class="error">' + escapeHtml(msg) + '</div>';
    }

    function bootstrapData(rows) {
      allData = sortRowsNewestFirst((rows || []).map(normalizeRow));
      filteredData = allData;
      fillFilters();
      applyFilters();
    }

    function apiBase() {
      var u = (window.__CONFIG_URL__ || '').trim();
      if (!u) return '';
      return u.replace(/\/+$/, '');
    }

    /** GAS Web アプリへ POST（form は CORS の「シンプルリクエスト」になりやすい） */
    function postGasForm(fields) {
      var b = apiBase();
      if (!b) return Promise.reject(new Error('no api base'));
      var body = new URLSearchParams();
      Object.keys(fields).forEach(function(k) {
        body.set(k, fields[k] == null ? '' : String(fields[k]));
      });
      return fetch(b, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: body.toString(),
        credentials: 'omit',
      });
    }

    function applyDocumentTitle(cfg) {
      var ui =
        typeof window.__UI_VERSION__ !== 'undefined' && String(window.__UI_VERSION__ || '').trim()
          ? String(window.__UI_VERSION__).trim()
          : 'v0.0.0[local]';
      var apiLabel = cfg && (cfg.gas_label || cfg.app_version) ? String(cfg.gas_label || cfg.app_version) : '';
      var next =
        apiLabel
          ? 'FC.REGALIA JY 6期生 動画一覧 (' + ui + ' · API ' + apiLabel + ')'
          : 'FC.REGALIA JY 6期生 動画一覧 (' + ui + ')';
      window.__REGALIA_TARGET_TITLE__ = next;
      window.__REGALIA_HEADER_BUILD__ = apiLabel
        ? '(' + ui + ' · API ' + apiLabel + ')'
        : '(' + ui + ')';
      document.title = next;
      var t = document.querySelector('title');
      if (t) {
        t.textContent = next;
      }
      var hb = document.getElementById('regalia-header-build');
      if (hb) {
        hb.textContent = window.__REGALIA_HEADER_BUILD__;
      }
    }

    /** LIFF / LINE WebView が document.title を握り続ける場合向けに差し戻し＋ページ内表示で確実に見せる */
    function syncDocumentTitleFromTarget() {
      var want = window.__REGALIA_TARGET_TITLE__;
      if (!want) return;
      if (document.title !== want) {
        document.title = want;
      }
      var el = document.querySelector('title');
      if (el && el.textContent !== want) {
        el.textContent = want;
      }
      var hb = document.getElementById('regalia-header-build');
      var b = window.__REGALIA_HEADER_BUILD__;
      if (hb && b && hb.textContent !== b) {
        hb.textContent = b;
      }
    }

    function startDocumentTitleGuard() {
      if (startDocumentTitleGuard._started) return;
      startDocumentTitleGuard._started = true;
      if (window.__REGALIA_TITLE_GUARD_HEAD__) return;
      var delays = [0, 50, 150, 400, 1000, 2500, 6000, 15000, 30000];
      delays.forEach(function(ms) {
        setTimeout(syncDocumentTitleFromTarget, ms);
      });
      startDocumentTitleGuard._iv = setInterval(syncDocumentTitleFromTarget, 400);
      setTimeout(function() {
        if (startDocumentTitleGuard._iv) {
          clearInterval(startDocumentTitleGuard._iv);
          startDocumentTitleGuard._iv = null;
        }
      }, 120000);
      var titleEl = document.querySelector('title');
      if (titleEl && typeof MutationObserver !== 'undefined') {
        startDocumentTitleGuard._mo = new MutationObserver(syncDocumentTitleFromTarget);
        startDocumentTitleGuard._mo.observe(titleEl, { childList: true, characterData: true, subtree: true });
      }
      window.addEventListener('pageshow', function() {
        syncDocumentTitleFromTarget();
      });
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden) syncDocumentTitleFromTarget();
      });
    }

    function showLoadingMessage(msg) {
      document.getElementById('content').innerHTML =
        '<div class="loading">' + escapeHtml(msg || '読み込み中...') + '</div>';
    }

    function apiErrorText(res) {
      if (!res || typeof res !== 'object') return 'データを取得できませんでした。';
      return (
        res.message ||
        res.error ||
        (res.code ? '[' + res.code + '] ' : '') + 'データを取得できませんでした。'
      );
    }

    function fetchSheetAfterAuth(idToken) {
      var b = apiBase();
      if (!b) {
        showLoadError('GAS の URL が設定されていません（ビルド時に __GAS_CONFIG_URL__ を注入してください）。');
        return Promise.resolve();
      }
      return postGasForm({ _path: 'api/videos', id_token: idToken || '' })
        .then(function(res) {
          if (!res.ok) {
            throw new Error('HTTP ' + res.status);
          }
          return res.json();
        })
        .then(function(res) {
          if (res && res.ok) {
            try {
              bootstrapData(res.rows || []);
            } catch (e) {
              showLoadError('データの表示に失敗しました: ' + String(e && e.message ? e.message : e));
            }
          } else {
            showLoadError(apiErrorText(res));
          }
        })
        .catch(function(err) {
          showLoadError('読み込みに失敗しました: ' + String(err && err.message ? err.message : err));
        });
    }

    function init() {
      var b = apiBase();
      if (!b) {
        showLoadError('GAS の URL が設定されていません（ビルド時に __GAS_CONFIG_URL__ を注入してください）。');
        return Promise.resolve();
      }
      return fetch(b + '?_path=config', { credentials: 'omit' })
        .then(function(res) {
          if (!res.ok) {
            throw new Error('config HTTP ' + res.status);
          }
          return res.text();
        })
        .then(function(txt) {
          try {
            return JSON.parse(txt);
          } catch (e) {
            throw new Error('config が JSON ではありません: ' + String(txt).slice(0, 120));
          }
        })
        .then(function(cfg) {
          window.__REGALIA_CFG__ = cfg || {};
          applyDocumentTitle(window.__REGALIA_CFG__);
          startDocumentTitleGuard();
          if (!cfg || !cfg.lineAuthRequired) {
            return fetchSheetAfterAuth('');
          }
          if (!cfg.liffId) {
            showLoadError(
              'スクリプトプロパティ LINE_LIFF_ID を設定してください（LINE_CHANNEL_ID を入れた場合は必須）。'
            );
            return;
          }
          return loadScript('https://static.line-scdn.net/liff/edge/2/sdk.js')
            .then(function() {
              return liff.init({ liffId: cfg.liffId, withLoginOnExternalBrowser: true });
            })
            .then(function() {
              applyDocumentTitle(window.__REGALIA_CFG__ || {});
              syncDocumentTitleFromTarget();
              if (!liff.isLoggedIn()) {
                showLoadingMessage(
                  'LINE でログインします。完了後にこのページが戻らない場合は、再読み込みしてください。'
                );
                liff.login({ redirectUri: location.href.split('#')[0] });
                return;
              }
              return fetchSheetAfterAuth(typeof liff.getIDToken === 'function' ? liff.getIDToken() || '' : '');
            })
            .catch(function(err) {
              showLoadError('LIFF の初期化に失敗しました: ' + (err && err.message ? err.message : String(err)));
            });
        })
        .catch(function(err) {
          showLoadError('設定の取得に失敗しました: ' + String(err && err.message ? err.message : err));
        });
    }

    function runSearchAndFilter() {
      fillFilters();
      applyFilters();
      var search = document.getElementById('search').value || '';
      var grade = document.getElementById('filterGrade').value || '';
      var match = document.getElementById('filterMatchName').value || '';
      var opponent = document.getElementById('filterOpponent').value || '';
      var uploader = document.getElementById('filterUploader').value || '';
      var month = document.getElementById('filterUploadMonth').value || '';
      if (apiBase()) {
        postGasForm({
          _path: 'api/log-filter',
          search: search,
          grade: grade,
          match: match,
          opponent: opponent,
          uploader: uploader,
          month: month,
        }).catch(function() {});
      }
    }

    document.getElementById('btnUpdate').addEventListener('click', runSearchAndFilter);
    document.getElementById('search').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        runSearchAndFilter();
      }
    });
    document.getElementById('filterGrade').addEventListener('change', function() {
      fillFilterMatchName();
      document.getElementById('filterMatchName').value = '';
      fillFilterOpponent();
      document.getElementById('filterOpponent').value = '';
      document.getElementById('filterUploader').value = '';
      document.getElementById('filterUploadMonth').value = '';
      runSearchAndFilter();
    });
    document.getElementById('filterMatchName').addEventListener('change', function() {
      fillFilterOpponent();
      document.getElementById('filterOpponent').value = '';
      document.getElementById('filterUploader').value = '';
      document.getElementById('filterUploadMonth').value = '';
      runSearchAndFilter();
    });
    document.getElementById('filterOpponent').addEventListener('change', function() {
      document.getElementById('filterUploader').value = '';
      document.getElementById('filterUploadMonth').value = '';
      runSearchAndFilter();
    });
    document.getElementById('filterUploader').addEventListener('change', runSearchAndFilter);
    document.getElementById('filterUploadMonth').addEventListener('change', runSearchAndFilter);
    document.getElementById('btnReset').addEventListener('click', resetFilters);

    (function() {
      var w = window.innerWidth || (window.screen && window.screen.width) || 0;
      /* iframe 埋め込み時のみ force-mobile（巨大フォント＋分割スクロール）。Pages/LIFF 単体は @media のみ。 */
      if (w <= 768 && window.parent !== window) {
        document.body.classList.add('force-mobile');
      }
    })();
    init().catch(function(err) {
      showLoadError(String(err && err.message ? err.message : err));
    });
  </script>
</body>
</html>
